# Ruff configuration for Python linting and formatting
target-version = "py39"
line-length = 100
exclude = ["clone/", "node_modules/"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "PLR2004",  # magic value comparisons
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B905",  # zip() strict= requires Python 3.10+; project supports >=3.9
]

[lint.isort]
known-first-party = ["recursive_field_math"]

[format]
quote-style = "double"
indent-style = "space"
