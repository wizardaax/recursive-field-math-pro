# =============================================================================
# aeon-python-ci.yml  —  Thin wrapper → wizardaax/aeon-standards python-ci
# =============================================================================
# This workflow delegates shared Python CI (lint, type-check, test, coverage)
# to the centralised reusable workflow in the aeon-standards control repo.
#
# Repo-specific advanced jobs (reproducibility figures, research plots) remain
# in ci-quality-gate.yml and are NOT delegated.
#
# Prerequisites:
#   - wizardaax/aeon-standards must be bootstrapped and contain
#     .github/workflows/python-ci.yml with a `workflow_call` trigger.
#   - Update the `@main` ref below to a stable tag (e.g. @v1) once available.
#
# See: https://github.com/wizardaax/aeon-standards
#      docs/ENGINEERING_STANDARDS.md
#      docs/COMPATIBILITY_MATRIX.md
# =============================================================================

name: Python CI (aeon-standards)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: aeon-python-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Delegate shared Python CI to aeon-standards reusable workflow.
  # Update `@main` to `@v1` once the control repo is tagged.
  # ---------------------------------------------------------------------------
  python-ci:
    name: Python CI (shared)
    uses: wizardaax/aeon-standards/.github/workflows/python-ci.yml@main
    with:
      python-versions: '["3.10", "3.11", "3.12"]'
      os: ubuntu-latest
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Repo-specific: reproducibility figures and manifest verification.
  # This job stays local because it depends on this repo's scripts and paper
  # artefacts — it is not a generic Python CI concern.
  # ---------------------------------------------------------------------------
  repro-figures:
    name: Reproducibility Figures + Manifest
    runs-on: ubuntu-latest
    needs: python-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib

      - name: Validate stats
        run: python scripts/validate_stats.py

      - name: Generate figures
        run: python scripts/generate_figures.py --theme light --format png --outdir paper/figures

      - name: Build checksums manifest
        run: python scripts/figure_manifest.py write --dir paper/figures --out paper/figures/manifest.sha256

      - name: Verify checksums manifest
        run: python scripts/figure_manifest.py verify --dir paper/figures --manifest paper/figures/manifest.sha256

      - name: Upload figure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rff-figures-with-manifest
          path: |
            paper/figures/*.png
            paper/figures/manifest.sha256
