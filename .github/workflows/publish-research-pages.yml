name: Publish Research Figures to GitHub Pages

on:
  workflow_run:
    workflows: ["Research Paper Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-research-pages
  cancel-in-progress: false

jobs:
  publish:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure figure directory exists (generate if missing)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install numpy matplotlib pandas
          mkdir -p paper/figures
          # Generate if empty to avoid publishing blank runs.
          if [ -z "$(ls -A paper/figures 2>/dev/null)" ]; then
            echo "paper/figures is empty, generating figures..."
            python scripts/generate_figures.py --theme light --format png --outdir paper/figures
          fi

      - name: Prepare publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_NUMBER="${{ github.event.workflow_run.run_number }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE_BRANCH="${{ github.event.workflow_run.head_branch }}"
            ACTOR="${{ github.event.workflow_run.actor.login }}"
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          else
            RUN_NUMBER="${{ github.run_number }}"
            RUN_ID="${{ github.run_id }}"
            SOURCE_SHA="${{ github.sha }}"
            SOURCE_BRANCH="${{ github.ref_name }}"
            ACTOR="${{ github.actor }}"
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          echo "run_number=$RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "source_branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages branch into ./_pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _pages
        continue-on-error: true

      - name: Initialize gh-pages if missing
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "_pages/.git" ]; then
            echo "gh-pages branch does not exist yet; initializing."
            git clone --no-checkout "https://github.com/${{ github.repository }}.git" _pages
            cd _pages
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo "<!doctype html><meta charset='utf-8'><title>Initializing...</title>" > index.html
            git add index.html
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore(pages): initialize gh-pages"
            git push origin gh-pages
          fi

      - name: Build Pages content
        shell: bash
        run: |
          set -euo pipefail
          RUN="${{ steps.meta.outputs.run_number }}"
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          SHA="${{ steps.meta.outputs.source_sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ steps.meta.outputs.source_branch }}"
          ACTOR="${{ steps.meta.outputs.actor }}"
          RUN_URL="${{ steps.meta.outputs.run_url }}"
          REPO="${{ github.repository }}"

          mkdir -p _pages/research/runs/"$RUN"
          mkdir -p _pages/research/latest

          # Copy generated figures into run folder
          cp -f paper/figures/*.png _pages/research/runs/"$RUN"/ 2>/dev/null || true
          cp -f paper/figures/*.svg _pages/research/runs/"$RUN"/ 2>/dev/null || true
          cp -f paper/figures/*.pdf _pages/research/runs/"$RUN"/ 2>/dev/null || true

          # Write per-run metadata
          cat > _pages/research/runs/"$RUN"/metadata.json <<EOF
          {
            "repository": "$REPO",
            "run_number": "$RUN",
            "run_url": "$RUN_URL",
            "source_sha": "$SHA",
            "source_branch": "$BRANCH",
            "actor": "$ACTOR",
            "published_at_utc": "$TS"
          }
          EOF

          # Per-run index
          cat > _pages/research/runs/"$RUN"/index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>RFF Research Figures — Run $RUN</title>
            <style>
              body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 2rem; line-height: 1.5; }
              .meta { color: #555; margin-bottom: 1rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
              .card { border: 1px solid #ddd; border-radius: 10px; padding: .8rem; }
              img { width: 100%; height: auto; border-radius: 8px; background: #fafafa; }
              code { background: #f4f4f4; padding: .1rem .35rem; border-radius: .25rem; }
            </style>
          </head>
          <body>
            <h1>RFF φ-Modulation Figures — Run $RUN</h1>
            <p class="meta">
              Repo: <code>$REPO</code><br/>
              Branch: <code>$BRANCH</code> · SHA: <code>$SHORT_SHA</code><br/>
              Actor: <code>$ACTOR</code><br/>
              Published (UTC): <code>$TS</code><br/>
              Actions run: <a href="$RUN_URL">$RUN_URL</a>
            </p>
            <p><a href="../">← All runs</a> · <a href="../../latest/">Latest snapshot</a></p>
            <div class="grid">
              <div class="card"><h3>nodes_vs_entropy</h3><a href="./nodes_vs_entropy.png"><img src="./nodes_vs_entropy.png" alt="nodes_vs_entropy"/></a></div>
              <div class="card"><h3>phi_scale_invariance</h3><a href="./phi_scale_invariance.png"><img src="./phi_scale_invariance.png" alt="phi_scale_invariance"/></a></div>
              <div class="card"><h3>radar_metrics</h3><a href="./radar_metrics.png"><img src="./radar_metrics.png" alt="radar_metrics"/></a></div>
              <div class="card"><h3>coherence_scale</h3><a href="./coherence_scale.png"><img src="./coherence_scale.png" alt="coherence_scale"/></a></div>
            </div>
          </body>
          </html>
          EOF

          # Update latest snapshot
          rm -rf _pages/research/latest/*
          cp -rf _pages/research/runs/"$RUN"/. _pages/research/latest/

          # Build runs listing index
          {
            echo "<!doctype html><html><head><meta charset='utf-8'/>"
            echo "<meta name='viewport' content='width=device-width, initial-scale=1'/>"
            echo "<title>RFF Research Runs</title>"
            echo "<style>body{font-family:ui-sans-serif,system-ui;margin:2rem} li{margin:.4rem 0} code{background:#f4f4f4;padding:.1rem .3rem;border-radius:.2rem}</style>"
            echo "</head><body>"
            echo "<h1>RFF Research Figure Runs</h1>"
            echo "<p>Latest: <a href='../latest/'>/research/latest/</a></p>"
            echo "<ul>"
            for d in $(ls -1 _pages/research/runs | sort -nr); do
              echo "<li><a href='./$d/'>Run $d</a></li>"
            done
            echo "</ul></body></html>"
          } > _pages/research/runs/index.html

          # Root index
          cat > _pages/index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>recursive-field-math-pro Pages</title>
            <style>
              body { font-family: ui-sans-serif, system-ui; margin: 2rem; line-height: 1.6; }
              a { text-decoration: none; }
            </style>
          </head>
          <body>
            <h1>recursive-field-math-pro — GitHub Pages</h1>
            <ul>
              <li><a href="./research/latest/">Research figures (latest)</a></li>
              <li><a href="./research/runs/">Research figures (all runs)</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Commit and push gh-pages updates
        shell: bash
        run: |
          set -euo pipefail
          cd _pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No gh-pages changes to commit."
            exit 0
          fi

          git commit -m "docs(pages): publish research figures run ${{ steps.meta.outputs.run_number }}"
          git push origin gh-pages
