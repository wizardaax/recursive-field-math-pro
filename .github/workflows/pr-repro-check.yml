name: PR Reproducibility Check

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/generate_figures.py"
      - "scripts/validate_stats.py"
      - "paper/data/ablation_metrics.csv"
      - "paper/rff_phi_mod_verification.tex"
      - "docs/rff_phi_mod_verification.md"
      - "paper/figures/**"
      - "scripts/figure_manifest.py"

permissions:
  contents: read

jobs:
  repro-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib

      - name: Regenerate figures
        run: python scripts/generate_figures.py --theme light --format png --outdir paper/figures

      - name: Generate fresh manifest
        run: python scripts/figure_manifest.py write --dir paper/figures --out /tmp/manifest.sha256

      - name: Compare with committed manifest (if present)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f paper/figures/manifest.sha256 ]; then
            diff -u paper/figures/manifest.sha256 /tmp/manifest.sha256
          else
            echo "ERROR: Manifest file not found at paper/figures/manifest.sha256."
            echo "Run 'make manifest' locally after generating figures and commit the result."
            exit 1
          fi
