name: Research Paper Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test-paper:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pandas pytest ruff black flake8 mypy

      - name: Lint
        run: |
          ruff check .
          black --check .
          flake8 .

      - name: Type check
        run: |
          mypy scripts --ignore-missing-imports

      - name: Run tests
        run: |
          pytest -q || true

      - name: Validate stats
        run: |
          python scripts/validate_stats.py

      - name: Generate figures
        run: |
          python scripts/generate_figures.py --theme light --format png --outdir paper/figures

      - name: Upload figure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rff-figures
          path: paper/figures/*
