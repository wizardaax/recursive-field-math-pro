name: CI Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint/Type/Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff black flake8 mypy numpy pandas matplotlib

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: Flake8
        run: flake8 .

      - name: Mypy
        run: mypy scripts --ignore-missing-imports

      - name: Pytest
        run: pytest -q

  reproducibility-figures:
    name: Reproducibility Figures + Manifest
    runs-on: ubuntu-latest
    needs: lint-type-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib

      - name: Validate stats
        run: python scripts/validate_stats.py

      - name: Generate figures
        run: python scripts/generate_figures.py --theme light --format png --outdir paper/figures

      - name: Build checksums manifest
        run: python scripts/figure_manifest.py write --dir paper/figures --out paper/figures/manifest.sha256

      - name: Verify checksums manifest
        run: python scripts/figure_manifest.py verify --dir paper/figures --manifest paper/figures/manifest.sha256

      - name: Upload figure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rff-figures-with-manifest
          path: |
            paper/figures/*.png
            paper/figures/manifest.sha256
