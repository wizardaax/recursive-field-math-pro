name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '.')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build artifacts
        run: bash scripts/build_artifacts.sh

      - name: Check artifacts
        run: bash scripts/check_artifacts.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/* --skip-existing

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Regen88 Codex ${{ env.TAG_NAME }}"
          body: |
            ## Regen88 Codex ${{ env.TAG_NAME }}

            ### Installation
            ```bash
            pip install regen88-codex==${{ env.TAG_NAME }}
            ```

            ### Verify Installation
            ```bash
            rfm --help
            python -c "import recursive_field_math; print('✓ Installation successful')"
            ```

            ### What's in this release
            **5-module substrate stack** with numerically hardened harmonic metrics:

            | Module | Public API | Description |
            |--------|-----------|-------------|
            | `eval_api` | `score()` | Deterministic RFF sequence scoring (`rff_v1` profile) |
            | `phi_ucb` | `phi_ucb_score()`, `select_best()` | φ-UCB exploration/exploitation for tree search |
            | `structural_detector` | `detect()` | φ-harmonic structural signature + anomaly index |
            | `containment_validator` | `validate()` | Layered-architecture containment geometry audit |
            | `xdomain_bridge` | `encode()`, `decode()`, `bridge()` | Bidirectional φ-latent cross-domain bridge (`xbridge_v1`) |

            All modules are fail-closed: degenerate or too-short inputs return
            `ok=False` with a human-readable `reason` rather than raising silently.

            ### Numeric hardening
            `math.hypot()` replaces manual `sqrt(a²+b²)` in `structural_detector`
            to avoid intermediate overflow and satisfy CodeQL's numeric-safety rules.

            ### Coverage
            **91.6 % total / 96.6 % Python** on the substrate stack.

            ### Usage docs
            See [`docs/usage/`](https://github.com/wizardaax/recursive-field-math-pro/tree/main/docs/usage)
            for per-module guides with worked examples.

            For the full change history, see [CHANGELOG.md](CHANGELOG.md).
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(env.TAG_NAME, 'rc') || contains(env.TAG_NAME, 'alpha') || contains(env.TAG_NAME, 'beta') || contains(env.TAG_NAME, 'substrate') }}
